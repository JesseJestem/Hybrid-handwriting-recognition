<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="images/favicon.png" type="image/png">
    <title>Handwriting Data Collection</title>
</head>
<body>
    <main class="container">
    <h1>Hybrid Handwriting Data Collection</h1>

    <section class="controls">
      <label for="labelSelect">Label:</label>
      <select id="labelSelect"></select>

      <button id="clearBtn">Clear</button>
      <button id="saveBtn">Save Sample</button>
    </section>

    <canvas id="drawingCanvas" width="400" height="400"></canvas>

    <section class="info">
      <p>Points: <span id="pointsCount">0</span></p>
      <p>Status: <span id="statusText">Ready</span></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
